################################################################################
# Reusable test + coverage pipeline
#
# Each job is individually conditional via `enable_*` inputs.
# Coverage runs after the corresponding test passes, or if the test was
# disabled (skipped). Coverage is gated to non-draft PRs, push, and
# merge_group events.
################################################################################
name: Tests
on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      enable_unit_tests:
        required: false
        type: boolean
        default: true
      enable_integration_tests:
        required: false
        type: boolean
        default: false
      enable_nightly_tests:
        required: false
        type: boolean
        default: false
      enable_benchmarks:
        required: false
        type: boolean
        default: false
      enable_unit_coverage:
        required: false
        type: boolean
        default: false
        description: Enable unit coverage report generation and upload.
      enable_integration_coverage:
        required: false
        type: boolean
        default: false
        description: Enable integration coverage report generation and upload.
      unit_test_command:
        required: false
        type: string
        default: "nix build -L .#test-unit"
      integration_test_command:
        required: false
        type: string
        default: "nix build -L .#test-integration"
      nightly_test_command:
        required: false
        type: string
        default: "nix build -L .#test-nightly"
      benchmark_command:
        required: false
        type: string
        default: "nix build .#bench-build"
      unit_coverage_command:
        required: false
        type: string
        default: "nix run .#coverage-unit"
      integration_coverage_command:
        required: false
        type: string
        default: "nix run .#coverage-integration"
      runner_unit:
        required: false
        type: string
        default: "ubuntu-latest"
        description: >-
          Runner for unit tests, nightly tests, benchmarks, and unit coverage.
      runner_integration:
        required: false
        type: string
        default: ""
        description: >-
          Runner for integration tests and coverage. Falls back to `runner_unit` if empty.
      test_timeout:
        required: false
        type: number
        default: 60
      benchmark_timeout:
        required: false
        type: number
        default: 20
      coverage_timeout:
        required: false
        type: number
        default: 60
    secrets:
      cachix_auth_token:
        required: true
      codecov_token:
        required: false
permissions: {}
env:
  RUST_BACKTRACE: "1"
  FOUNDRY_PROFILE: ci
jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit
    if: inputs.enable_unit_tests
    runs-on: ${{ inputs.runner_unit }}
    timeout-minutes: ${{ inputs.test_timeout }}
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Run Unit
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.unit_test_command }}
  integration-test:
    name: Integration
    if: inputs.enable_integration_tests
    runs-on: ${{ inputs.runner_integration || inputs.runner_unit }}
    timeout-minutes: ${{ inputs.test_timeout }}
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Run Integration
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.integration_test_command }}
  nightly-test:
    name: Unit Nightly
    if: inputs.enable_nightly_tests
    runs-on: ${{ inputs.runner_unit }}
    timeout-minutes: ${{ inputs.test_timeout }}
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Run Unit Nightly
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.nightly_test_command }}
  # ── Benchmark ──────────────────────────────────────────────────────────────
  benchmark:
    name: Benchmark
    if: inputs.enable_benchmarks
    runs-on: ${{ inputs.runner_unit }}
    timeout-minutes: ${{ inputs.benchmark_timeout }}
    permissions:
      contents: read
    steps:
      - name: Run Benchmark
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.benchmark_command }}
  # ── Coverage ───────────────────────────────────────────────────────────────
  unit-coverage:
    name: Coverage / Unit
    needs: [unit-test]
    if: >-
      always() && inputs.enable_unit_coverage && (needs['unit-test'].result == 'success' || needs['unit-test'].result == 'skipped') && (


        github.event_name == 'push' ||
        github.event_name == 'merge_group' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ${{ inputs.runner_unit }}
    timeout-minutes: ${{ inputs.coverage_timeout }}
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Generate Unit report
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.unit_coverage_command }}
      - name: Upload Unit report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          files: coverage.lcov
          flags: unit
          fail_ci_if_error: true
          token: ${{ secrets.codecov_token }}
  integration-coverage:
    name: Coverage / Integration
    needs: [integration-test]
    if: >-
      always() && inputs.enable_integration_coverage && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped') && (


        github.event_name == 'push' ||
        github.event_name == 'merge_group' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ${{ inputs.runner_integration || inputs.runner_unit }}
    timeout-minutes: ${{ inputs.coverage_timeout }}
    permissions:
      contents: read
    env:
      CI: "true"
    steps:
      - name: Generate Integration report
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.integration_coverage_command }}
      - name: Upload Integration report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          files: coverage.lcov
          flags: integration
          fail_ci_if_error: true
          token: ${{ secrets.codecov_token }}
