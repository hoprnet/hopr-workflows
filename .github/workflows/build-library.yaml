#################################################################################
# Pipeline to build libraries
#################################################################################
name: Build library
on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      version_type:
        required: true
        type: string
      architecture:
        required: true
        type: string
      cachix_cache_name:
        required: false
        type: string
        description: "Cachix cache name to use"
      build_file:
        required: false
        type: string
        default: "Cargo.toml"
        description: "File to extract version from"
      package_name:
        required: true
        type: string
        description: "Name of the package being built"
      timeout_minutes:
        required: false
        type: number
        default: 60
        description: "Timeout for the job in minutes"
      runner:
        required: true
        type: string
      enabled:
        required: false
        type: boolean
        default: true
        description: "Whether to run this job"
    secrets:
      cachix_auth_token:
        required: true
      cargo_registry_token:
        required: false
        description: "crates.io API token (required when version_type is 'release')"
concurrency:
  group: ${{ github.repository }}-${{ inputs.source_branch }}-${{ github.workflow }}-${{ inputs.architecture }}-${{ inputs.package_name }}-library
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    name: Build
    if: inputs.enabled
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.source_branch }}
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@setup-nix-v1
        with:
          cachix_cache_name: ${{ inputs.cachix_cache_name }}
          cachix_auth_token: "${{ secrets.cachix_auth_token }}"
      - name: Build dry-run library
        if: inputs.version_type != 'release'
        shell: bash
        run: nix develop -c nix shell nixpkgs#cargo-release -c cargo release publish --package "$PACKAGE" --all-features
        env:
          PACKAGE: ${{ inputs.package_name }}
      - name: Publish library
        if: inputs.version_type == 'release'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.cargo_registry_token }}
          PACKAGE: ${{ inputs.package_name }}
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::secrets.cargo_registry_token is required when version_type='release'"
            exit 1
          fi
          nix develop -c nix shell nixpkgs#cargo-release -c cargo release publish --package "$PACKAGE" --execute --all-features --no-confirm
