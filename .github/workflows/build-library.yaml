#################################################################################
# Pipeline to build libraries
#################################################################################
name: Build library
on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      version_type:
        required: true
        type: string
      architecture:
        required: true
        type: string
      cachix_cache_name:
        required: false
        type: string
        description: "Cachix cache name to use"
      nix_path:
        required: false
        type: string
        default: nixpkgs=channel:nixos-26.05
        description: "Nix path to use"
      build_file:
        required: false
        type: string
        default: "Cargo.toml"
        description: "File to extract version from"
      package_name:
        required: false
        type: string
        description: "Name of the package being built"
      timeout_minutes:
        required: false
        type: number
        default: 60
        description: "Timeout for the job in minutes"
      runner:
        required: false
        type: string
        default: depot-ubuntu-22.04-4
      enabled:
        required: false
        type: boolean
        default: true
        description: "Whether to run this job"
    secrets:
      cachix_auth_token:
        required: true
concurrency:
  group: ${{ github.repository }}-${{ inputs.source_branch }}-${{ github.workflow }}-${{ inputs.architecture }}-${{ inputs.package_name }}-library
  cancel-in-progress: true
permissions:
  contents: read
  id-token: write
jobs:
  build:
    name: Build
    if: inputs.enabled
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.source_branch }}
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@5477bd53d62ac15c4804b31fbd55966b29a43997 # setup-nix-v2
        with:
          cachix_cache_name: ${{ inputs.cachix_cache_name }}
          cachix_auth_token: "${{ secrets.cachix_auth_token }}"
          nix_path: ${{ inputs.nix_path }}
      - name: Build dry-run library
        if: inputs.version_type != 'release'
        shell: bash
        run: nix develop -c cargo release publish $CONTEXT --all-features
        env:
          CONTEXT: ${{ inputs.package_name != '' && format('--package {0}', inputs.package_name) || '--workspace' }}
      - name: Authenticate with crates.io
        if: inputs.version_type == 'release'
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Publish library
        if: inputs.version_type == 'release'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          CONTEXT: ${{ inputs.package_name != '' && format('--package {0}', inputs.package_name) || '--workspace' }}
        run: nix develop -c cargo release publish $CONTEXT --execute --all-features --no-confirm
