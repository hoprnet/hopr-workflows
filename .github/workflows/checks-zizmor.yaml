################################################################################
# Reusable zizmor security check pipeline
#
# Runs zizmor to scan GitHub Actions workflows for security issues and
# uploads the results as a SARIF file to the GitHub Security tab.
#
# This workflow declares its own `security-events: write` permission at
# the job level for the SARIF upload. No additional permissions are
# required from the caller.
################################################################################
name: Zizmor
on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: depot-ubuntu-22.04
      zizmor_command:
        required: false
        type: string
        default: 'nix develop -L .#ci -c bash -c "zizmor --format sarif . > results.sarif"'
      nix_path:
        required: false
        type: string
        default: nixpkgs=channel:nixos-26.05
        description: "Nix path to use"
    secrets:
      cachix_auth_token:
        required: true
permissions: {}
jobs:
  zizmor:
    name: Zizmor
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.source_branch }}
      - name: Setup Nix
        uses: ./actions/setup-nix
        with:
          cachix_cache_name: hoprnet
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          nix_path: ${{ inputs.nix_path }}
      - name: Run zizmor
        shell: bash
        run: ${{ inputs.zizmor_command }}
        env:
          GH_TOKEN: ${{ github.token }}
          NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: results.sarif
          category: zizmor
