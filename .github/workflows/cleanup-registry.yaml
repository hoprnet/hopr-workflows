#################################################################################
# Pipeline to clean up registry from artifacts and docker images
#################################################################################
name: Cleanup registry
env:
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: always
permissions:
  contents: read
on:
  schedule:
    - cron: "30 1 * * *" # Daily at 01:30 UTC
jobs:
  cleanup-registry:
    name: Cleanup Registry
    runs-on: depot-ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          disable-sudo: false
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@setup-gcp-v3
        with:
          google_credentials: ${{ secrets.GOOGLE_HOPRASSOCIATION_CREDENTIALS_REGISTRY }}
          install_sdk: "true"
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@5477bd53d62ac15c4804b31fbd55966b29a43997 # setup-nix-v2
        with:
          cachix_cache_name: hopr-workflows
          cachix_auth_token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Cleanup Docker images
        timeout-minutes: 20
        run: nix run .#cleanup-docker-images -- -p hoprassociation -l europe-west3 -r docker-images
      - name: Cleanup Artifact files
        timeout-minutes: 20
        run: nix run .#cleanup-artifact-files -- -p hoprassociation -l europe-west3 -r rust-binaries
      - name: Cleanup NPM packages
        timeout-minutes: 20
        run: nix run .#cleanup-npm-packages -- -p hoprassociation -l europe-west3 -r npm
