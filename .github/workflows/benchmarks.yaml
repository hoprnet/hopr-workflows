name: Benchmarks
on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      runner:
        required: true
        type: string
      bencher_project:
        required: true
        type: string
        description: "Bencher project name"
      should_build:
        required: true
        type: boolean
        description: "Whether to build benchmarks"
      should_run:
        required: true
        type: boolean
        description: "Whether to run benchmarks after building them"
      build_command:
        required: true
        type: string
        description: "Command to build benchmarks"
      run_command:
        required: true
        type: string
        description: "Command to run benchmarks"
      zulip_stream:
        required: false
        type: string
        default: "HOPRd"
        description: "Zulip stream name"
      zulip_topic:
        required: false
        type: string
        default: "Benchmark regressions"
        description: "Zulip topic name"
      build_timeout_minutes:
        required: false
        type: number
        default: 90
        description: "Timeout in minutes for the build job"
      run_timeout_minutes:
        required: false
        type: number
        default: 720
        description: "Timeout in minutes for the run job"
    secrets:
      cachix_auth_token:
        required: true
      bencher_api_token:
        required: false
      ZULIP_API_KEY:
        required: false
      ZULIP_EMAIL:
        required: false
jobs:
  build-benchmarks:
    name: Build Benchmarks
    if: inputs.should_build == true
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.build_timeout_minutes }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.source_branch }}
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@43b03a7b5df777770d95c6524f48be34184b26fa # setup-nix-v1
        with:
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
      - name: Build benchmarks
        run: ${{ inputs.build_command }}
  run-benchmarks:
    name: Run Benchmarks
    needs: build-benchmarks
    if: always() && inputs.should_run == true && (needs.build-benchmarks.result == 'success' || needs.build-benchmarks.result == 'skipped')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.run_timeout_minutes }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-sudo: true
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.source_branch }}
      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@43b03a7b5df777770d95c6524f48be34184b26fa # setup-nix-v1
        with:
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
      - name: Compute short SHA
        id: short_sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          echo "value=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "full=${SHA}" >> "$GITHUB_OUTPUT"
      - name: Install Bencher CLI
        uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8
      - name: Execute and Upload (PR)
        if: github.event_name == 'pull_request'
        id: bencher_pr
        shell: bash
        run: |
          set +e
          bencher run \
            --project ${{ inputs.bencher_project }} \
            --token "${{ secrets.bencher_api_token }}" \
            --adapter rust_criterion \
            --branch "${{ inputs.source_branch }}" \
            --github-actions "${{ secrets.GITHUB_TOKEN }}" \
            --err \
            "${{ inputs.run_command }}" 2>&1 | tee bencher_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Extract Bencher Run URL
          BENCHER_RUN_URL=$(grep -oE "https://bencher.dev/(console/projects/${{ inputs.bencher_project }}/runs/|perf/${{ inputs.bencher_project }}/reports/)[^[:space:]]+" bencher_output.txt | head -n 1)
          echo "bencher_run_url=${BENCHER_RUN_URL:-https://bencher.dev/console/projects/${{ inputs.bencher_project }}}" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE
        env:
          BENCHER_API_TOKEN: ${{ secrets.bencher_api_token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify performance drop (PR)
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
        if: failure() && github.event_name == 'pull_request' && env.ZULIP_API_KEY != '' && env.ZULIP_EMAIL != ''
        env:
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          ZULIP_EMAIL: ${{ secrets.ZULIP_EMAIL }}
        with:
          api-key: ${{ env.ZULIP_API_KEY }}
          email: ${{ env.ZULIP_EMAIL }}
          organization-url: "https://hopr.zulipchat.com"
          type: "stream"
          to: "${{ inputs.zulip_stream }}"
          topic: "${{ inputs.zulip_topic }}"
          content: |
            Benchmark run failed or detected a regression for PR [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}) at commit [`${{ steps.short_sha.outputs.value }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.short_sha.outputs.full }}).

            See [Bencher Run](${{ steps.bencher_pr.outputs.bencher_run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}) for details.
      - name: Execute and Upload (Merge/Push)
        if: github.event_name != 'pull_request'
        id: bencher_merge
        shell: bash
        run: |
          set +e
          # Capture stdout and stderr, tee to file
          bencher run \
            --project ${{ inputs.bencher_project }} \
            --token "${{ secrets.bencher_api_token }}" \
            --adapter rust_criterion \
            --branch "${{ inputs.source_branch }}" \
            --err \
            "${{ inputs.run_command }}" 2>&1 | tee bencher_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Extract Bencher Report URL
          BENCHER_REPORT_URL=$(grep -oE "https://bencher.dev/(console/projects/${{ inputs.bencher_project }}/reports/|perf/${{ inputs.bencher_project }}/reports/)[^[:space:]]+" bencher_output.txt | head -n 1)
          echo "bencher_report_url=${BENCHER_REPORT_URL:-https://bencher.dev/console/projects/${{ inputs.bencher_project }}}" >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE
        env:
          BENCHER_API_TOKEN: ${{ secrets.bencher_api_token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify performance drop (Merge/Push)
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
        if: failure() && github.event_name != 'pull_request' && env.ZULIP_API_KEY != '' && env.ZULIP_EMAIL != ''
        env:
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          ZULIP_EMAIL: ${{ secrets.ZULIP_EMAIL }}
        with:
          api-key: ${{ env.ZULIP_API_KEY }}
          email: ${{ env.ZULIP_EMAIL }}
          organization-url: "https://hopr.zulipchat.com"
          type: "stream"
          to: "${{ inputs.zulip_stream }}"
          topic: "${{ inputs.zulip_topic }}"
          content: |
            Benchmark run failed or detected a regression on `${{ github.ref_name }}` at commit [`${{ steps.short_sha.outputs.value }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.short_sha.outputs.full }}).

            See [Bencher Report](${{ steps.bencher_merge.outputs.bencher_report_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}) for details.
