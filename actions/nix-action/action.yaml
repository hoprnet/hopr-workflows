name: Nix Action
description: >
  Composite action that handles the common CI boilerplate: harden runner, checkout, Nix/Cachix setup (via setup-nix), and command execution.

inputs:
  command:
    description: Shell command(s) to execute (supports multi-line)
    required: true
  source_branch:
    description: Git branch to checkout
    required: false
    default: main
  cachix_cache_name:
    description: Cachix cache name (passed to setup-nix)
    required: false
    default: hoprnet
  cachix_auth_token:
    description: Cachix authentication token (passed to setup-nix)
    required: false
    default: ""
  disable_sudo:
    description: Whether to disable sudo in harden-runner
    required: false
    default: "true"
  persist_credentials:
    description: Whether to persist git credentials after checkout
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        disable-sudo: ${{ inputs.disable_sudo }}
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: ${{ inputs.persist_credentials }}
        ref: ${{ inputs.source_branch }}
    - name: Setup Nix
      uses: hoprnet/hopr-workflows/actions/setup-nix@setup-nix-v1
      with:
        cachix_cache_name: ${{ inputs.cachix_cache_name }}
        cachix_auth_token: ${{ inputs.cachix_auth_token }}
    - name: Run command
      shell: bash
      run: ${{ inputs.command }}
